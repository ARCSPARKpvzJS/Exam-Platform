<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI EXAM PRO | Stable v2.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loading-dots:after { content: '.'; animation: dots 1s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60% { content: '...'; } 80%, 100% { content: ''; } }
        .answer-correct { border-color: #22c55e; background-color: #f0fdf4; }
        .answer-wrong { border-color: #ef4444; background-color: #fef2f2; }
        @media print {
            nav, #setup-area, #loading, button, .text-xs, input { display: none !important; }
            body { background: white !important; }
            .bg-white { box-shadow: none !important; border: 1px solid #e2e8f0 !important; margin-bottom: 1.5rem !important; page-break-inside: avoid; }
            #exam-paper { display: block !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-white border-b sticky top-0 z-50">
        <div class="max-w-4xl mx-auto px-4 h-16 flex justify-between items-center">
            <span class="text-xl font-black text-slate-800 tracking-tight tracking-tighter">AI EXAM PRO</span>
            <div class="flex items-center gap-3">
                <button onclick="toggleLang()" class="text-xs font-bold px-2 py-1 border rounded hover:bg-slate-50" id="lang-btn">EN / 中</button>
                <button onclick="window.print()" id="btn-print" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-lg text-xs font-bold border border-blue-200"></button>
                <input type="password" id="apiKey" placeholder="OpenAI Key" class="text-xs border rounded px-2 py-1 w-32 outline-none">
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 py-8">
        <section id="setup-area" class="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-slate-200">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <span class="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span>
                <span id="title-setup"></span>
            </h2>
            <div class="space-y-4">
                <textarea id="exam-prompt" rows="3" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
                    <div class="p-3 border rounded-lg bg-white">
                        <label class="text-xs text-slate-500" id="lbl-choice"></label>
                        <input type="number" id="num-choice" value="2" class="w-full font-bold outline-none">
                    </div>
                    <div class="p-3 border rounded-lg bg-white">
                        <label class="text-xs text-slate-500" id="lbl-judge"></label>
                        <input type="number" id="num-judge" value="2" class="w-full font-bold outline-none">
                    </div>
                    <div class="p-3 border rounded-lg bg-white">
                        <label class="text-xs text-slate-500" id="lbl-fill"></label>
                        <input type="number" id="num-fill" value="1" class="w-full font-bold outline-none">
                    </div>
                    <div class="p-3 border rounded-lg bg-white">
                        <label class="text-xs text-slate-500" id="lbl-big"></label>
                        <input type="number" id="num-big" value="1" class="w-full font-bold outline-none">
                    </div>
                </div>

                <button onclick="generateExam()" id="gen-btn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold hover:bg-black transition-colors shadow-lg"></button>
            </div>
        </section>

        <div id="loading" class="hidden text-center py-20">
            <p class="text-slate-600 font-medium" id="txt-loading"></p>
        </div>

        <section id="exam-paper" class="hidden space-y-8 pb-20"></section>
    </main>

    <script>
        let currentLang = 'en';
        let currentExamData = [];

        const i18n = {
            en: {
                print: "Export PDF", setup: "Customize Exam", promptPlural: "Topics or Reference Questions...",
                choice: "Multiple Choice", judge: "True/False", fill: "Fill in Blanks", big: "Proofs/Large Questions",
                generate: "Generate Exam", loading: "AI is composing questions", correct: "✓ Correct", wrong: "✗ Incorrect",
                ans: "Correct Answer", analysis: "Analysis", submit: "Submit Answer", grading: "AI Grading...", score: "Score"
            },
            zh: {
                print: "导出 PDF", setup: "定制考卷", promptPlural: "输入主题或参考题目...",
                choice: "单选题数", judge: "判断题数", fill: "填空题数", big: "证明/大题数",
                generate: "生成考卷", loading: "AI 正在命题中", correct: "✓ 回答正确", wrong: "✗ 回答错误",
                ans: "正确答案", analysis: "解析", submit: "提交判题", grading: "AI 正在评改...", score: "得分"
            }
        };

        function updateUI() {
            const lang = i18n[currentLang];
            for (let key in lang) {
                const el = document.getElementById(`btn-${key}`) || document.getElementById(`lbl-${key}`) || document.getElementById(`title-${key}`) || document.getElementById(`txt-${key}`) || document.getElementById(`gen-btn`);
                if (el) {
                    if (el.id === 'gen-btn') el.innerText = lang.generate;
                    else el.innerText = lang[key];
                }
            }
            document.getElementById('exam-prompt').placeholder = lang.promptPlural;
            document.getElementById('btn-print').innerText = lang.print;
        }

        function toggleLang() { currentLang = currentLang === 'en' ? 'zh' : 'en'; updateUI(); }

        async function callAI(messages) {
            const key = document.getElementById('apiKey').value;
            if(!key) return alert('Please enter API Key');
            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ model: "gpt-4-turbo-preview", messages: messages, response_format: { type: "json_object" } })
                });
                return await response.json();
            } catch (e) { alert('API Error'); return null; }
        }

        async function generateExam() {
            const promptInput = document.getElementById('exam-prompt').value;
            const counts = {
                choice: document.getElementById('num-choice').value,
                judge: document.getElementById('num-judge').value,
                fill: document.getElementById('num-fill').value,
                big: document.getElementById('num-big').value
            };

            document.getElementById('setup-area').classList.add('hidden');
            document.getElementById('loading').classList.remove('hidden');

            const systemMsg = `You are a professional examiner. Generate an exam in ${currentLang === 'en' ? 'English' : 'Chinese'}. 
            CRITICAL: You MUST generate EXACTLY the following number of questions:
            Multiple Choice: ${counts.choice}, True/False: ${counts.judge}, Fill-in-blank: ${counts.fill}, Proofs: ${counts.big}.
            Return JSON: {"questions": [{"type":"choice"|"judge"|"fill"|"proof", "question":"", "options":[], "answer":"", "analysis":""}]}.
            For Choice questions, 'answer' must be the letter (A, B, C, or D). For True/False, use 'True'/'False' or '正确'/'错误'.`;

            const res = await callAI([{role: "system", content: systemMsg}, {role: "user", content: promptInput}]);
            if(res) {
                currentExamData = JSON.parse(res.choices[0].message.content).questions;
                renderExam();
            }
            document.getElementById('loading').classList.add('hidden');
        }

        function renderExam() {
            const paper = document.getElementById('exam-paper');
            paper.innerHTML = `<h2 class="text-2xl font-black text-center mb-10">${currentLang === 'en' ? 'Test Paper' : '模拟试卷'}</h2>`;
            paper.classList.remove('hidden');

            currentExamData.forEach((q, idx) => {
                const qBox = document.createElement('div');
                qBox.className = "bg-white rounded-2xl p-6 shadow-sm border border-slate-200";
                qBox.id = `q-container-${idx}`;
                let html = `<p class="text-lg font-medium mb-4">${idx + 1}. ${q.question}</p>`;

                if(q.type === 'choice') {
                    q.options.forEach((opt, oIdx) => {
                        const letter = String.fromCharCode(65 + oIdx);
                        html += `<button onclick="checkObj(${idx}, '${letter}')" class="w-full text-left p-3 mb-2 border rounded-xl hover:bg-slate-50 flex gap-3"><span class="font-bold">${letter}.</span>${opt}</button>`;
                    });
                } else if(q.type === 'judge') {
                    const opts = currentLang === 'en' ? ['True', 'False'] : ['正确', '错误'];
                    opts.forEach(opt => html += `<button onclick="checkObj(${idx},'${opt}')" class="w-full p-3 mb-2 border rounded-xl font-bold">${opt}</button>`);
                } else {
                    html += `<textarea id="input-${idx}" rows="4" class="w-full p-4 bg-slate-50 border rounded-xl outline-none"></textarea>
                             <button onclick="${q.type === 'fill' ? `checkObj(${idx})` : `checkSub(${idx})`}" class="mt-4 bg-blue-600 text-white px-6 py-2 rounded-lg font-bold">${i18n[currentLang].submit}</button>`;
                }
                html += `<div id="result-${idx}" class="hidden mt-4 p-4 rounded-xl text-sm border"></div>`;
                qBox.innerHTML = html;
                paper.appendChild(qBox);
            });
        }

        function checkObj(idx, userAns) {
            const q = currentExamData[idx];
            const lang = i18n[currentLang];
            const resultBox = document.getElementById(`result-${idx}`);
            const inputVal = userAns || document.getElementById(`input-${idx}`).value.trim();
            
            // 修复 Bug 2: 更加稳健的匹配逻辑
            const cleanUser = inputVal.toUpperCase().replace(/[^A-Z正确错误TRUEFALSE]/g, '');
            const cleanCorrect = q.answer.toUpperCase().replace(/[^A-Z正确错误TRUEFALSE]/g, '');
            const isCorrect = cleanUser === cleanCorrect || cleanCorrect.includes(cleanUser) && cleanUser.length === 1;

            resultBox.innerHTML = `<div class="font-black ${isCorrect ? 'text-green-600' : 'text-red-600'} mb-2">${isCorrect ? lang.correct : lang.wrong}</div>
                                   <div><b>${lang.ans}:</b> ${q.answer}</div><div class="italic mt-2"><b>${lang.analysis}:</b> ${q.analysis}</div>`;
            resultBox.classList.remove('hidden');
            document.getElementById(`q-container-${idx}`).className = `bg-white rounded-2xl p-6 shadow-sm border-2 ${isCorrect ? 'answer-correct' : 'answer-wrong'}`;
        }

        async function checkSub(idx) {
            const q = currentExamData[idx];
            const lang = i18n[currentLang];
            const userAns = document.getElementById(`input-${idx}`).value;
            const resultBox = document.getElementById(`result-${idx}`);
            resultBox.innerHTML = lang.grading;
            resultBox.classList.remove('hidden');

            const res = await callAI([
                {role: "system", content: `Grade this proof. Return JSON: {"score":0-100, "comment":"", "correct_answer":""}`},
                {role: "user", content: `Q: ${q.question}\nKey: ${q.answer}\nUser: ${userAns}`}
            ]);

            if(res) {
                const eval = JSON.parse(res.choices[0].message.content);
                resultBox.innerHTML = `<div class="font-black text-blue-600 mb-2">${lang.score}: ${eval.score}/100</div><div>${eval.comment}</div>`;
            }
        }

        updateUI();
    </script>
</body>
</html>
